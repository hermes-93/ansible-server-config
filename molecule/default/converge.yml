---
- name: Converge — apply all roles
  hosts: all
  become: true
  vars:
    # Override settings for test environment (Docker container)
    ufw_enabled: false          # Docker containers can't run ufw
    auditd_enabled: false       # auditd not available in containers
    swap_enabled: false         # No swap in containers
    ssh_allowed_users: []
    docker_service_state: stopped   # Can't start Docker-in-Docker reliably
    docker_service_enabled: false
    ntp_enabled: false              # systemd-timesyncd not idempotent in containers
  roles:
    - role: common
    - role: docker
    - role: nginx
    - role: security
