---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
  notify: Restart nginx
  tags: [nginx]

- name: Deploy nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: Reload nginx
  tags: [nginx, config]

- name: Remove default vhost
  ansible.builtin.file:
    path: "{{ nginx_vhost_enabled_dir }}/default"
    state: absent
  when: nginx_remove_default_vhost
  notify: Reload nginx
  tags: [nginx, vhosts]

- name: Deploy vhost configs
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "{{ nginx_vhost_dir }}/{{ item.server_name.split()[0] }}.conf"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ nginx_vhosts }}"
  notify: Reload nginx
  tags: [nginx, vhosts]

- name: Enable vhosts (symlink to sites-enabled)
  ansible.builtin.file:
    src: "{{ nginx_vhost_dir }}/{{ item.server_name.split()[0] }}.conf"
    dest: "{{ nginx_vhost_enabled_dir }}/{{ item.server_name.split()[0] }}.conf"
    state: link
  loop: "{{ nginx_vhosts }}"
  notify: Reload nginx
  tags: [nginx, vhosts]

- name: Ensure web root directories exist
  ansible.builtin.file:
    path: "{{ item.root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop: "{{ nginx_vhosts }}"
  tags: [nginx, vhosts]

- name: Enable and start Nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
  tags: [nginx]

- name: Test Nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  tags: [nginx, verify]
