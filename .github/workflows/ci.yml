---
name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (yamllint + ansible-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install yamllint ansible ansible-lint

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint --profile production

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ansible
        run: pip install ansible

      - name: Install requirements
        run: ansible-galaxy collection install -r requirements.yml

      - name: Syntax check — site.yml
        run: ansible-playbook playbooks/site.yml --syntax-check -i inventory/hosts.ini

      - name: Syntax check — security.yml
        run: ansible-playbook playbooks/security.yml --syntax-check -i inventory/hosts.ini

  molecule:
    name: Molecule Tests
    runs-on: ubuntu-latest
    needs: syntax-check
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - default
          - security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule scenario — ${{ matrix.scenario }}
        run: molecule test --scenario-name ${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
