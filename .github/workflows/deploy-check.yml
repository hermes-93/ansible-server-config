---
name: Deploy Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Target host group (e.g. webservers, all)"
        required: false
        default: "all"

jobs:
  check-mode:
    name: Ansible --check mode
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ansible
        run: pip install ansible

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Write test inventory
        run: |
          cat > /tmp/test_inventory.ini << 'EOF'
          [webservers]
          localhost ansible_connection=local

          [dbservers]

          [monitoring]

          [all:vars]
          ansible_user=runner
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Run ansible --check (dry-run)
        run: |
          ansible-playbook playbooks/site.yml \
            --check \
            --diff \
            -i /tmp/test_inventory.ini \
            --limit webservers \
            -e "ufw_enabled=false auditd_enabled=false swap_enabled=false" \
            -v
        continue-on-error: true

      - name: Summarize check results
        run: echo "Dry-run completed. Review diff output above for planned changes."
